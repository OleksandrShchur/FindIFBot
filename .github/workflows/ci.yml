name: build-and-test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore FindIFBot.sln

      - name: Build
        run: dotnet build FindIFBot.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FindIFBot.sln --configuration Release --no-build
